<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тестирование Cookies</title>
    <style>
        body {
            font-family: monospace;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        .container {
            background: #2d2d2d;
            padding: 20px;
            border-radius: 10px;
        }
        button {
            background: #007acc;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            font-size: 14px;
            border-radius: 5px;
        }
        button:hover {
            background: #005a9e;
        }
        .result {
            background: #1e1e1e;
            padding: 10px;
            margin-top: 20px;
            border: 1px solid #444;
            border-radius: 5px;
            white-space: pre-wrap;
        }
        hr {
            border-color: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Тестирование Cookies</h1>
        
        <button onclick="setCookies()">Установить cookies</button>
        <button onclick="getCookies()">Получить cookies</button>
        <button onclick="clearResult()">Очистить</button>
        
        <div class="result" id="result">
            Нажмите на кнопку...
        </div>
        
        <hr>
        
        <div>
            <strong>Информация:</strong><br>
            • <strong>Обычная cookie</strong> - может быть изменена на клиенте<br>
            • <strong>Подписанная cookie</strong> - защищена от подделки (signed)<br>
            • Подписанная cookie содержит подпись, которую нельзя сфальсифицировать без секрета
        </div>
    </div>

    <script>
        const resultDiv = document.getElementById('result');
        const BASE_URL = 'http://localhost:3000';

        async function setCookies() {
            resultDiv.innerHTML = 'Установка cookies...\n';
            
            try {
                const response = await fetch(`${BASE_URL}/set`, {
                    credentials: 'include'
                });
                const text = await response.text();
                resultDiv.innerHTML += `Ответ: ${text}\n`;
                resultDiv.innerHTML += `\nCookies установлены. Нажмите "Получить cookies" чтобы посмотреть.`;
            } catch (error) {
                resultDiv.innerHTML += `Ошибка: ${error.message}`;
            }
        }

        async function getCookies() {
            resultDiv.innerHTML = 'Получение cookies...\n';
            
            try {
                const response = await fetch(`${BASE_URL}/get`, {
                    credentials: 'include'
                });
                const data = await response.json();
                
                resultDiv.innerHTML += `\nОбычные cookies: ${JSON.stringify(data.normal, null, 2)}\n`;
                resultDiv.innerHTML += `\nПодписанные cookies: ${JSON.stringify(data.signed, null, 2)}`;
            } catch (error) {
                resultDiv.innerHTML += `Ошибка: ${error.message}`;
            }
        }

        function clearResult() {
            resultDiv.innerHTML = 'Очищено. Нажмите на кнопку...';
        }
    </script>
</body>
</html>
